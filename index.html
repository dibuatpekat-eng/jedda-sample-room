<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jedda — Sample Room</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--cream); }
  .login-wrap { width: min(380px, 96vw); }
  .login-brand { text-align: center; margin-bottom: 40px; }
  .login-brand-logo { height: 28px; width: auto; display: none; margin: 0 auto 10px; }
  .login-brand-name { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink); }
  .login-brand-sub { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-30); margin-top: 8px; }
  .login-card { background: var(--warm-white); border: 0.5px solid var(--border); border-radius: 3px; padding: 32px; }
  .login-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-60); margin-bottom: 24px; text-align: center; }
  .error-msg { background: var(--terracota-light); border-left: 2px solid var(--terracota); padding: 8px 12px; font-size: 12px; color: var(--terracota); margin-bottom: 16px; border-radius: 0 2px 2px 0; display: none; }
  .login-footer { text-align: center; margin-top: 20px; font-size: 10px; color: var(--ink-30); letter-spacing: 0.06em; }
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 36px; }
  .pw-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--ink-30); font-size: 12px; padding: 0; line-height: 1; }
  .pw-toggle:hover { color: var(--ink-60); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <img class="login-brand-logo" src="images/jedda-logo.png" alt="Jedda"
      onload="this.style.display='block';document.getElementById('login-brand-text').style.display='none'"
      onerror="this.style.display='none'">
    <div id="login-brand-text" class="login-brand-name">Jedda</div>
    <div class="login-brand-sub">Sample Room</div>
  </div>
  <div class="login-card">
    <div class="login-title">Sign in to continue</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="form-row">
      <label class="form-label">Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-row" style="margin-bottom:20px">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="pw-toggle" onclick="togglePassword()" id="pw-btn" title="Show/hide password">Show</button>
      </div>
    </div>
    <button class="btn btn-dark btn-full" id="login-btn" onclick="doLogin()">Sign in</button>
  </div>
  <div class="login-footer">Jedda Internal System · Sample Room v4.0</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase.js"></script>
<script>
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) redirectByRole();
  });

  async function redirectByRole() {
    const { data: { user } } = await db.auth.getUser();
    if (!user) return;
    const { data: profile } = await db.from('profiles').select('role').eq('id', user.id).single();
    if (!profile) return;
    const map = { head: 'dashboard-head.html', designer: 'dashboard-designer.html', supervisor: 'dashboard-supervisor.html' };
    window.location.href = map[profile.role] || 'index.html';
  }

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');
    if (!email || !password) { showError('Please fill in all fields.'); return; }
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.style.display = 'none';
    const { error } = await db.auth.signInWithPassword({ email, password });
    if (error) {
      showError('Invalid email or password.');
      btn.disabled = false;
      btn.textContent = 'Sign in';
      return;
    }
    redirectByRole();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function togglePassword() {
    const input = document.getElementById('password');
    const btn = document.getElementById('pw-btn');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.textContent = isHidden ? 'Hide' : 'Show';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
