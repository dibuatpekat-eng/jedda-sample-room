<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jedda — Supervisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
*{box-sizing:border-box}

.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:#fafaf9;font-family:'Inter',sans-serif;color:#1a1a1a}

/* ── TOPBAR ── */
.topbar{height:44px;background:#111;display:flex;align-items:center;padding:0 32px;flex-shrink:0;gap:0}
.topbar-logo{height:18px;filter:brightness(0) invert(1)}
.topbar-spacer{flex:1}
.topbar-right{display:flex;align-items:center;gap:20px}
.season-tag{font-size:9px;color:#555;letter-spacing:0.14em;text-transform:uppercase;font-family:'Inter',sans-serif}
.uname{font-size:11px;color:#666;letter-spacing:0.04em;font-family:'Inter',sans-serif}
.logout-btn{background:none;border:none;color:#444;cursor:pointer;font-size:13px;padding:2px 0 2px 4px;line-height:1}
.logout-btn:hover{color:#aaa}

/* ── NAV TABS ── */
.nav-row{display:flex;border-bottom:0.5px solid #e0ddd8;padding:0 32px;background:#fafaf9;flex-shrink:0}
.nav-tab{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#bbb;padding:15px 0;margin-right:36px;cursor:pointer;border:none;background:none;position:relative;transition:color .15s;display:flex;align-items:center;gap:7px;white-space:nowrap;font-family:'Inter',sans-serif}
.nav-tab:hover{color:#666}
.nav-tab.active{color:#111}
.nav-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:#111}
.nav-badge{font-size:9px;background:#EF9F27;color:#111;padding:1px 6px;border-radius:20px;font-weight:500;letter-spacing:0;font-family:'Inter',sans-serif}

/* ── PAGES ── */
.page{display:none;flex:1;flex-direction:column;overflow:hidden;min-width:0}
.page.active{display:flex}

/* ── STATS BAR ── */
.stats-bar{display:flex;padding:0 32px;border-bottom:0.5px solid #e0ddd8;flex-shrink:0}
.stat-item{padding:22px 52px 22px 0}
.stat-num{font-size:30px;font-weight:300;color:#111;letter-spacing:-0.03em;line-height:1;font-family:'Inter',sans-serif}
.stat-lbl{font-size:9px;color:#bbb;letter-spacing:0.14em;text-transform:uppercase;margin-top:5px;font-family:'Inter',sans-serif}

/* ── SUB TABS ── */
.sub-tab-row{display:flex;padding:0 32px;border-bottom:0.5px solid #e0ddd8;flex-shrink:0}
.sub-tab{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#bbb;padding:10px 0;margin-right:28px;cursor:pointer;border:none;background:none;position:relative;transition:color .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;font-family:'Inter',sans-serif}
.sub-tab:hover{color:#666}
.sub-tab.active{color:#111}
.sub-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:#111}
.sub-count{font-size:9px;color:#ccc;letter-spacing:0;font-weight:400}
.sub-tab.active .sub-count{color:#999}

/* ── TABLE STRUCTURE ── */
.table-area{flex:1;overflow-y:auto;min-width:0}
.col-head{display:grid;padding:9px 32px;border-bottom:0.5px solid #e0ddd8;position:sticky;top:0;background:#fafaf9;z-index:3}
.col-head span{font-size:9px;letter-spacing:0.13em;text-transform:uppercase;color:#bbb;font-weight:400;font-family:'Inter',sans-serif}
.col-head span.right{text-align:right}
.col-head span.sortable{cursor:pointer;user-select:none;transition:color .15s}
.col-head span.sortable:hover{color:#888}
.col-head span.sort-active{color:#111}
.sort-arrow{display:inline-block;margin-left:3px;opacity:0.5;font-size:8px}
.sort-active .sort-arrow{opacity:1}
.grid-sv{grid-template-columns:2.4fr 0.9fr 1.4fr 130px 20px}
.grid-mat{grid-template-columns:2.4fr 0.9fr 1.4fr 140px 20px}
.grid-master-2{grid-template-columns:2fr 1fr}
.grid-master-3{grid-template-columns:2fr 1fr 1fr}
.grid-fab{grid-template-columns:1.4fr 1.8fr 0.8fr 80px 20px}
.grid-int{grid-template-columns:1.2fr 0.8fr 1fr 0.8fr 1fr 80px}

/* ── GROUP HEADER ── */
.group-hdr{padding:10px 32px 6px;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:#bbb;border-bottom:0.5px solid #eae7e2;background:#f3f2ee;display:flex;align-items:center;gap:6px;font-family:'Inter',sans-serif}

/* ── DATA ROW ── */
.data-row{display:grid;padding:14px 32px;border-bottom:0.5px solid #eae7e2;cursor:pointer;transition:background .1s;align-items:center;background:#fafaf9;min-width:0}
.data-row:hover{background:#f2efe9}
.data-row.row-open{background:#edebe5}
.cell-name-main{font-size:12px;color:#111;display:flex;align-items:center;gap:9px;letter-spacing:0.01em}
.cell-name-sub{font-size:10px;color:#bbb;margin-top:2px;padding-left:14px;letter-spacing:0.02em}
.cell-cat{font-size:10px;color:#bbb;letter-spacing:0.08em;text-transform:uppercase}
.cell-vendor{font-size:11px;color:#888}
.cell-status{text-align:right}
.cell-chevron{font-size:13px;color:#ccc;text-align:right;transition:transform .2s;line-height:1}
.cell-chevron.open{transform:rotate(90deg)}

/* ── STATUS DOT ── */
.sdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;display:inline-block}
.sdot-blue{background:#378ADD}
.sdot-amber{background:#EF9F27}
.sdot-green{background:#639922}
.sdot-red{background:#E24B4A}
.sdot-gray{background:#ccc}

/* ── BADGES ── */
.badge{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;padding:3px 9px;display:inline-block;font-family:'Inter',sans-serif}
.badge-todo{background:#f0eeea;color:#777}
.badge-rev{background:#faeeda;color:#854F0B}
.badge-await{background:#faeeda;color:#854F0B}
.badge-ok{background:#EAF3DE;color:#3B6D11}
.badge-miss{background:#FCEBEB;color:#A32D2D}
.badge-ready{background:#EAF3DE;color:#3B6D11}
.badge-prog{background:#f0eeea;color:#888}
.badge-siap{background:#EAF3DE;color:#3B6D11;border:0.5px solid #97C459}
.badge-wait-mat{background:#fdf6e8;color:#854F0B;border:0.5px solid #EF9F27}

/* ── EXPAND PANEL ── */
.expand-wrap{display:none;border-bottom:0.5px solid #d4d1cb}
.expand-wrap.open{display:block}
.expand-body{padding:16px 32px 18px;display:grid;grid-template-columns:1fr 1fr;gap:32px;background:#edebe5}
.expand-actions{padding:10px 32px 14px;border-top:0.5px solid #d0cdc7;display:flex;gap:8px;align-items:center;background:#edebe5}
.ep-sec{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#aaa;padding-bottom:7px;border-bottom:0.5px solid #d0cdc7;margin-bottom:10px;font-family:'Inter',sans-serif}
.ep-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:0.5px solid #e2dfd8}
.ep-row:last-child{border-bottom:none}
.ep-key{font-size:11px;color:#aaa}
.ep-val{font-size:11px;color:#111;text-align:right;max-width:60%}

/* ── SPEC BOX ── */
.spec-box{background:#e4e0d8;padding:13px 15px}
.spec-r{display:flex;gap:10px;padding:6px 0;border-bottom:0.5px solid #cac7bf}
.spec-r:last-child{border-bottom:none}
.spec-k{font-size:10px;color:#999;width:76px;flex-shrink:0}
.spec-v{font-size:11px;color:#111;flex:1;line-height:1.55}

/* ── PROGRESS STEPS ── */
.prog-wrap{display:flex;align-items:center;margin-bottom:20px}
.prog-line{flex:1;height:0.5px;background:#cac7bf;margin-bottom:14px}
.prog-step{display:flex;flex-direction:column;align-items:center;gap:4px}
.prog-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px}
.p-done{background:#EAF3DE;color:#3B6D11;border:0.5px solid #97C459}
.p-curr{background:#111;color:#fafaf9}
.p-wait{background:transparent;color:#ccc;border:0.5px solid #ccc}
.prog-lbl{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;text-align:center;white-space:nowrap;font-family:'Inter',sans-serif}
.l-done{color:#639922}
.l-curr{color:#111}
.l-wait{color:#ccc}

/* ── REVISION / OK BOX ── */
.rev-note-box{background:#faeeda;padding:12px 15px;margin-bottom:16px}
.rev-note-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#854F0B;margin-bottom:4px;font-family:'Inter',sans-serif}
.rev-note-txt{font-size:11px;color:#633806;line-height:1.6}
.ok-banner{background:#EAF3DE;padding:12px 15px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.ok-text{font-size:12px;color:#3B6D11;font-weight:500}

/* ── READINESS ── */
.r-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:2px}
.r-card{border:0.5px solid #cac7bf;padding:11px 13px;background:#e6e2da}
.r-card-title{font-size:10px;font-weight:500;color:#111;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.r-check{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.r-check.ok{background:#EAF3DE;color:#3B6D11}
.r-check.no{background:#FCEBEB;color:#A32D2D}
.r-item{font-size:11px;color:#aaa;padding:3px 0;display:flex;align-items:center;gap:5px}
.r-item.ok{color:#111}
.r-file-link{font-size:10px;color:#185FA5;cursor:pointer;text-decoration:underline;margin-left:auto}
.r-hint{font-size:10px;margin-top:8px}
.r-hint.ok{color:#3B6D11}
.r-hint.warn{color:#854F0B}

/* ── MATERIAL ITEMS ── */
.mat-item-row{display:flex;align-items:flex-start;padding:11px 0;border-bottom:0.5px solid #dedbd4;gap:16px}
.mat-item-row:last-child{border-bottom:none}
.mat-item-name{font-size:12px;color:#111}
.mat-item-type{font-size:9px;color:#bbb;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;font-family:'Inter',sans-serif}
.mat-item-contact{font-size:10px;color:#A32D2D;margin-top:5px;display:flex;align-items:center;gap:5px}

/* On order: estimated date field */
.mat-eta-row{margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mat-eta-label{font-size:9px;color:#185FA5;letter-spacing:0.08em;text-transform:uppercase;font-family:'Inter',sans-serif}
.mat-eta-input{font-size:11px;padding:4px 8px;border:0.5px solid #85B7EB;background:#E6F1FB;color:#185FA5;outline:none;border-radius:0;width:140px;font-family:'Inter',sans-serif}
.mat-eta-save{font-size:9px;padding:4px 10px;border:0.5px solid #85B7EB;background:#185FA5;color:#fff;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;border-radius:0;font-family:'Inter',sans-serif}
.mat-eta-display{font-size:10px;color:#185FA5;margin-top:6px}

/* Missing: supplier info */
.mat-supplier-panel{margin-top:8px;background:#fdf0f0;border:0.5px solid #F09595;padding:10px 12px}
.mat-supplier-name{font-size:11px;color:#A32D2D;font-weight:500}
.mat-supplier-contact{font-size:10px;color:#888;margin-top:2px}
.mat-supplier-link{font-size:10px;color:#185FA5;text-decoration:underline;cursor:pointer;display:inline-block;margin-top:4px}

.mat-togs{display:flex;gap:2px;flex-shrink:0;margin-top:1px}
.mtbtn{font-size:9px;padding:4px 10px;border:0.5px solid #d0cdc7;background:none;color:#bbb;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;transition:all .1s;font-family:'Inter',sans-serif}
.mtbtn:hover{border-color:#888;color:#555}
.mt-r{background:#EAF3DE;border-color:#97C459;color:#3B6D11}
.mt-o{background:#E6F1FB;border-color:#85B7EB;color:#185FA5}
.mt-m{background:#FCEBEB;border-color:#F09595;color:#A32D2D}

/* ── ADD FORM ── */
.add-sv-wrap{background:#edebe5;border-bottom:0.5px solid #d0cdc7;padding:20px 32px 24px}
.add-mat-form{background:#e4e0d8;padding:14px 15px;margin-top:12px}
.add-inline{display:flex;align-items:center;gap:7px;padding:11px 32px;font-size:10px;color:#bbb;cursor:pointer;border-bottom:0.5px solid #eae7e2;letter-spacing:0.06em;text-transform:uppercase;transition:all .1s;background:#fafaf9;font-family:'Inter',sans-serif}
.add-inline:hover{color:#666;background:#f2efe9}
.flabel{font-size:9px;color:#999;margin-bottom:4px;display:block;letter-spacing:0.08em;text-transform:uppercase;font-family:'Inter',sans-serif}
.finput{width:100%;font-size:11px;padding:7px 9px;border:0.5px solid #cac7bf;background:#fafaf9;color:#111;outline:none;margin-bottom:10px;border-radius:0;font-family:'Inter',sans-serif}
.finput:focus{border-color:#888}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── MASTER LIST ROWS ── */
.master-row{display:grid;padding:12px 32px;border-bottom:0.5px solid #eae7e2;align-items:center;background:#fafaf9;cursor:default}
.master-row.clickable{cursor:pointer;transition:background .1s}
.master-row.clickable:hover{background:#f2efe9}
.master-row.row-open{background:#edebe5}
.master-name{font-size:12px;color:#111}
.master-sub{font-size:10px;color:#aaa}
.master-tag{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:#aaa;font-family:'Inter',sans-serif}

/* Fabric expand */
.fab-expand{display:none;background:#edebe5;border-bottom:0.5px solid #d4d1cb;padding:16px 32px 20px}
.fab-expand.open{display:block}
.fab-vendor-link{font-size:11px;color:#185FA5;text-decoration:underline;cursor:pointer}
.fab-vendor-link:hover{color:#0c447c}

/* Fabric edit form */
.fab-edit-form{background:#e4e0d8;padding:14px 15px;margin-top:12px}
.qty-tag{font-size:11px;color:#555;background:#ebe8e2;padding:2px 9px;display:inline-block}

/* Interlining table */
.int-row{display:grid;padding:11px 32px;border-bottom:0.5px solid #eae7e2;align-items:center;background:#fafaf9;cursor:default;transition:background .1s}
.int-row:hover{background:#f2efe9}
.int-tag{font-size:9px;letter-spacing:0.07em;text-transform:uppercase;padding:2px 8px;border-radius:2px}
.int-soft{background:#EAF3DE;color:#3B6D11}
.int-medium{background:#E6F1FB;color:#185FA5}
.int-hard{background:#FCEBEB;color:#A32D2D}
.int-none{background:#f0eeea;color:#aaa}

/* Vendor page: collapsible groups */
.vend-group-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 32px;cursor:pointer;background:#f3f2ee;border-bottom:0.5px solid #eae7e2;user-select:none;transition:background .1s}
.vend-group-hdr:hover{background:#eeece7}
.vend-group-title{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#888;font-family:'Inter',sans-serif}
.vend-group-count{font-size:10px;color:#bbb}
.vend-group-chevron{font-size:13px;color:#ccc;transition:transform .2s}
.vend-group-chevron.open{transform:rotate(90deg)}
.vend-group-body{display:none}
.vend-group-body.open{display:block}

/* Vendor edit row */
.vend-row{display:grid;padding:13px 32px;border-bottom:0.5px solid #eae7e2;align-items:center;background:#fafaf9;transition:background .1s}
.vend-row:hover{background:#f2efe9}
.vend-name{font-size:12px;color:#111}
.vend-cat{font-size:10px;color:#aaa;letter-spacing:0.06em;text-transform:uppercase;font-family:'Inter',sans-serif}
.vend-contact{font-size:11px;color:#555}
.vend-contact.none{color:#ccc;font-style:italic}
.vend-edit-btn{font-size:9px;color:#bbb;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;border:none;background:none;padding:3px 6px;border-radius:0;transition:color .1s;font-family:'Inter',sans-serif}
.vend-edit-btn:hover{color:#111}
.vend-edit-form{background:#edebe5;border-bottom:0.5px solid #d4d1cb;padding:16px 32px 20px;display:none}
.vend-edit-form.open{display:block}
.grid-vend-4{grid-template-columns:1.8fr 1fr 1.4fr 60px}

/* Production ready expand */
.prod-expand{display:none;background:#edebe5;border-bottom:0.5px solid #d4d1cb;padding:16px 32px 20px}
.prod-expand.open{display:block}
.prod-section{margin-bottom:18px}
.prod-section:last-child{margin-bottom:0}
.size-pill{display:inline-block;font-size:10px;padding:3px 10px;border-radius:2px;margin:2px;font-family:'Inter',sans-serif}
.size-pill-ok{background:#EAF3DE;color:#3B6D11;border:0.5px solid #97C459}
.size-pill-pending{background:#f0eeea;color:#aaa;border:0.5px solid #d0cdc7}

/* Compact readiness */
.r-summary{display:flex;align-items:center;gap:6px;font-size:10px;margin-top:2px}
.r-summary.ok{color:#3B6D11}
.r-summary.warn{color:#854F0B}

/* ── BUTTONS ── */
.btn{font-size:10px;padding:8px 20px;border:none;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;transition:opacity .15s;border-radius:0;font-family:'Inter',sans-serif}
.btn-dark{background:#111;color:#fafaf9}
.btn-dark:hover{opacity:.8}
.btn-ghost{background:none;color:#888;border:0.5px solid #d0cdc7;padding:8px 14px}
.btn-ghost:hover{border-color:#888;color:#111}
.btn-sm{font-size:9px;padding:5px 11px}

.empty{padding:56px 32px;font-size:10px;color:#ccc;letter-spacing:0.12em;text-transform:uppercase;text-align:center;font-family:'Inter',sans-serif}

/* ── REVISION HISTORY ── */
.rev-hist-item{padding:10px 0;border-bottom:0.5px solid #d8d5cf}
.rev-hist-item:last-child{border-bottom:none}
.rev-hist-num{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#854F0B;margin-bottom:4px;display:flex;align-items:center;gap:8px;font-family:'Inter',sans-serif}
.rev-hist-date{color:#cca97a;font-size:9px;letter-spacing:0.04em;text-transform:none}
.rev-hist-note{font-size:11px;color:#633806;line-height:1.6;background:#faeeda;padding:8px 12px;margin-top:4px}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>

<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <img src="images/jedda-logo.png" class="topbar-logo" alt="Jedda">
    <div class="topbar-spacer"></div>
    <div class="topbar-right">
      <span class="season-tag" id="season-label">—</span>
      <span class="uname" id="user-name">Loading...</span>
      <button class="logout-btn" onclick="logout()" title="Sign out">↪</button>
    </div>
  </div>

  <!-- NAV TABS -->
  <div class="nav-row">
    <button class="nav-tab active" onclick="navTo('sample-vendor',this)">
      Sample Vendor
      <span class="nav-badge" id="nb-sv" style="display:none">0</span>
    </button>
    <button class="nav-tab" onclick="navTo('material-prep',this)">
      Material Prep
      <span class="nav-badge" id="nb-mat" style="display:none">0</span>
    </button>
    <button class="nav-tab" onclick="navTo('prod-ready',this)">
      Siap Produksi
      <span class="nav-badge" id="nb-prod" style="display:none">0</span>
    </button>
    <button class="nav-tab" onclick="navTo('master-fabrics',this)">Fabrics</button>
    <button class="nav-tab" onclick="navTo('master-interlinings',this)">Interlinings</button>
    <button class="nav-tab" onclick="navTo('master-vendors',this)">Vendors</button>
  </div>

  <!-- ══ SAMPLE VENDOR ══ -->
  <div class="page active" id="page-sample-vendor">
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-num" id="sv-s1">—</div><div class="stat-lbl">To do</div></div>
      <div class="stat-item"><div class="stat-num" id="sv-s2">—</div><div class="stat-lbl">Revisi</div></div>
      <div class="stat-item"><div class="stat-num" id="sv-s3">—</div><div class="stat-lbl">Menunggu Head</div></div>
      <div class="stat-item"><div class="stat-num" id="sv-s4">—</div><div class="stat-lbl">Disetujui</div></div>
    </div>
    <div class="sub-tab-row">
      <button class="sub-tab active" id="svt-todo"     onclick="svTab('todo',this)">To do <span class="sub-count" id="tc-todo">—</span></button>
      <button class="sub-tab"        id="svt-revision"  onclick="svTab('revision',this)">Revisi <span class="sub-count" id="tc-rev">—</span></button>
      <button class="sub-tab"        id="svt-awaiting"  onclick="svTab('awaiting',this)">Menunggu Head <span class="sub-count" id="tc-await">—</span></button>
      <button class="sub-tab"        id="svt-approved"  onclick="svTab('approved',this)">Disetujui <span class="sub-count" id="tc-approved">—</span></button>
    </div>
    <div class="table-area">
      <div class="col-head grid-sv">
        <span>Artikel / Ukuran</span><span>Kategori</span><span>Vendor</span><span class="right">Status</span><span></span>
      </div>
      <div id="sv-list"><div class="empty">Memuat...</div></div>
    </div>
  </div>

  <!-- ══ MATERIAL PREP ══ -->
  <div class="page" id="page-material-prep">
    <div class="table-area">
      <div class="col-head grid-mat">
        <span>Artikel</span><span>Kategori</span><span>Desainer</span><span class="right">Material</span><span></span>
      </div>
      <div id="mat-list"><div class="empty">Memuat...</div></div>
    </div>
  </div>

  <!-- ══ SIAP PRODUKSI ══ -->
  <div class="page" id="page-prod-ready">
    <div class="table-area">
      <div class="col-head" style="grid-template-columns:2.4fr 0.9fr 1.4fr 1fr 20px">
        <span>Artikel</span><span>Kategori</span><span>Desainer</span><span class="right">Status</span><span></span>
      </div>
      <div id="prod-list"><div class="empty">Memuat...</div></div>
    </div>
  </div>

  <!-- ══ MASTER FABRICS ══ -->
  <div class="page" id="page-master-fabrics">
    <div class="table-area">
      <div class="col-head grid-fab">
        <span>Nama</span><span>Warna</span><span>Supplier</span><span>Qty</span><span></span>
      </div>
      <div id="fab-list"><div class="empty">Memuat...</div></div>
    </div>
  </div>

  <!-- ══ MASTER INTERLININGS ══ -->
  <div class="page" id="page-master-interlinings">
    <div class="table-area">
      <div class="col-head grid-int" id="int-col-head">
        <span class="sortable" onclick="sortInt('name')">Nama <span class="sort-arrow">↕</span></span>
        <span class="sortable" onclick="sortInt('kategori')">Kategori <span class="sort-arrow">↕</span></span>
        <span class="sortable" onclick="sortInt('jenis')">Jenis <span class="sort-arrow">↕</span></span>
        <span class="sortable" onclick="sortInt('peruntukan')">Peruntukan <span class="sort-arrow">↕</span></span>
        <span class="sortable" onclick="sortInt('supplier')">Supplier <span class="sort-arrow">↕</span></span>
        <span>Qty</span>
      </div>
      <div id="int-list"><div class="empty">Memuat...</div></div>
    </div>
  </div>

  <!-- ══ MASTER VENDORS ══ -->
  <div class="page" id="page-master-vendors">
    <div class="table-area">
      <div id="vend-list"><div class="empty">Memuat...</div></div>
    </div>
  </div>

</div>

<script>
let profile=null
let allArticles=[],allMatArticles=[],allSvItems=[],allSmItems=[],allMatItems=[]
let masterFabrics=[],masterInterlinings=[],masterVendors=[]
let masterButtons=[],masterZippers=[],konveksiVendors=[]
let svTabMode='todo'
let openSvId=null,openMatId=null,openFabName=null,openVendId=null,openProdId=null
let intSortCol='name',intSortDir='asc'
let vendGroupOpen={konveksi:false,supplier:false}

// ── INIT ──────────────────────────────────────────
async function init(){
  profile=await requireAuth(['supervisor','head'])
  if(!profile) return
  document.getElementById('user-name').textContent=profile.full_name
  await loadAll()
}

async function loadAll(){
  const selectStr=`id,name,category,stage,size_range,
    profiles!articles_designer_id_fkey(full_name),
    article_iterations(id,label,is_final_spec,
      iteration_fabrics(fabric_name,color),
      iteration_interlining(interlining_name,position),
      iteration_accessories(category,button_id,zipper_id,sort_order)),
    size_packs(id,size_label,file_path,confirmed),
    article_cetakan(id,type,file_path,skip_approved)`

  const [arts, artsAll, svs, sms, mats, fabs, ints, vens, btns, zips, seasons]=await Promise.all([
    db.from('articles').select(selectStr)
      .eq('status','active').in('stage',['sample_master','sample_vendor','production'])
      .order('created_at',{ascending:false}),
    db.from('articles').select(`id,name,category,stage,size_range,
      profiles!articles_designer_id_fkey(full_name),
      article_iterations(id,label,is_final_spec,
        iteration_fabrics(fabric_name,color),
        iteration_interlining(interlining_name,position),
        iteration_accessories(category,button_id,zipper_id,sort_order))`)
      .eq('status','active').order('created_at',{ascending:false}),
    db.from('sample_vendors').select('*').order('created_at'),
    db.from('sample_masters').select('id,article_id,size,color,status,done_at').order('created_at'),
    db.from('article_material_status').select('*').order('created_at'),
    db.from('master_fabrics').select('id,name,color,vendor,qty').order('name'),
    db.from('master_interlinings').select('id,name,kategori,jenis,peruntukan,supplier,qty').order('name'),
    db.from('master_vendors').select('id,name,contact,supply_category').order('supply_category,name'),
    db.from('master_buttons').select('id,supplier,name,color,size'),
    db.from('master_zippers').select('id,type,size,color_code'),
    db.from('collections').select('short_name').eq('is_active',true).limit(1),
  ])
  allArticles=arts.data||[]
  const matIds=new Set((mats.data||[]).map(m=>m.article_id))
  allMatArticles=(artsAll.data||[]).filter(a=>
    ['sample_master','sample_vendor','production'].includes(a.stage) || matIds.has(a.id)
  )
  allSvItems=svs.data||[];allSmItems=sms.data||[]
  allMatItems=mats.data||[];masterFabrics=fabs.data||[];masterInterlinings=ints.data||[]
  masterVendors=vens.data||[];masterButtons=btns.data||[];masterZippers=zips.data||[]
  konveksiVendors=masterVendors.filter(v=>v.supply_category==='konveksi')
  document.getElementById('season-label').textContent=seasons.data?.[0]?.short_name||'—'
  renderSvList();updateSvStats();renderProdReadyPage();renderMatList();updateBadges()
  renderFabrics();renderInterlinings();renderVendors()
}

// ── HELPERS ──────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(d){if(!d)return '—';return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}
function accLabel(ac){
  if(ac.category==='button'&&ac.button_id){const b=masterButtons.find(x=>x.id===ac.button_id);return b?`Button ${b.name||''} ${b.color||''} ${b.size||''}`.trim():'Button —'}
  if(ac.category==='zipper'&&ac.zipper_id){const z=masterZippers.find(x=>x.id===ac.zipper_id);return z?`Zipper ${z.type||''} ${z.size||''} ${z.color_code||''}`.trim():'Zipper —'}
  return '—'
}
async function openFile(fp){
  const{data}=await db.storage.from('jedda-files').createSignedUrl(fp,60)
  if(data?.signedUrl)window.open(data.signedUrl,'_blank')
  else toast('Gagal load file.')
}

// ── NAV ──────────────────────────────────────────
function navTo(page,el){
  document.querySelectorAll('.nav-tab').forEach(n=>n.classList.remove('active'));el.classList.add('active')
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.getElementById('page-'+page).classList.add('active')
  if(page==='prod-ready') renderProdReadyPage()
}

// ── SV TAB LOGIC ─────────────────────────────────
function svTab(mode,el){
  svTabMode=mode;openSvId=null
  document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active')
  renderSvList()
}
function tabMatch(status){
  if(svTabMode==='todo')     return status==='in_progress' || status==='requested'
  if(svTabMode==='revision') return status==='revision'
  if(svTabMode==='awaiting') return status==='awaiting_head'
  if(svTabMode==='approved') return status==='approved'
  return false
}
function dotClass(s){
  if(s==='requested')     return 'sdot-blue'
  if(s==='in_progress')   return 'sdot-gray'
  if(s==='revision')      return 'sdot-amber'
  if(s==='awaiting_head') return 'sdot-amber'
  if(s==='approved')      return 'sdot-green'
  return 'sdot-gray'
}
function badgeHtml(s){
  if(s==='requested')     return '<span class="badge badge-todo" style="color:#185FA5;background:#E6F1FB">Requested</span>'
  if(s==='in_progress')   return '<span class="badge badge-todo">To do</span>'
  if(s==='revision')      return '<span class="badge badge-rev">Revisi</span>'
  if(s==='awaiting_head') return '<span class="badge badge-await">Menunggu</span>'
  if(s==='approved')      return '<span class="badge badge-ok">Disetujui</span>'
  return ''
}

function updateSvStats(){
  const t=allSvItems.filter(s=>s.status==='in_progress'||s.status==='requested').length
  const r=allSvItems.filter(s=>s.status==='revision').length
  const a=allSvItems.filter(s=>s.status==='awaiting_head').length
  const p=allSvItems.filter(s=>s.status==='approved').length
  document.getElementById('sv-s1').textContent=t
  document.getElementById('sv-s2').textContent=r
  document.getElementById('sv-s3').textContent=a
  document.getElementById('sv-s4').textContent=p
  document.getElementById('tc-todo').textContent=t
  document.getElementById('tc-rev').textContent=r
  document.getElementById('tc-await').textContent=a
  document.getElementById('tc-approved').textContent=p
}

// ── PRODUCTION READY PAGE ────────────────────────
// Logic: SV approved (minimal 1) → vendor eligible
// Sizes bisa turun = SM done size apa saja
// Material status: kuning kalau ada yang belum ready
function renderProdReadyPage(){
  const el=document.getElementById('prod-list')
  if(!el) return

  // Cari artikel yang punya minimal 1 SV approved
  const eligibleArts=allArticles.filter(a=>
    allSvItems.some(sv=>sv.article_id===a.id && sv.status==='approved')
  )

  const nb=document.getElementById('nb-prod')
  if(nb){nb.textContent=eligibleArts.length;nb.style.display=eligibleArts.length>0?'':'none'}

  if(!eligibleArts.length){
    el.innerHTML='<div class="empty">Belum ada artikel yang siap turun produksi.</div>';return
  }

  el.innerHTML=eligibleArts.map(a=>{
    const approvedSvs=allSvItems.filter(sv=>sv.article_id===a.id && sv.status==='approved')
    const doneSms=allSmItems.filter(sm=>sm.article_id===a.id && sm.status==='done')
    const matItems=allMatItems.filter(m=>m.article_id===a.id)
    const allMatReady=matItems.length>0 && matItems.every(m=>m.material_status==='ready')
    const hasMissingMat=matItems.some(m=>m.material_status==='missing')
    const isOpen=openProdId===a.id

    // Status: hijau = semua material ready, kuning = ada yang belum
    const dotCls=allMatReady?'sdot-green':hasMissingMat?'sdot-red':'sdot-amber'
    const statusBadge=allMatReady
      ?'<span class="badge badge-ready">Siap</span>'
      :'<span class="badge badge-wait-mat">Tunggu Material</span>'

    const vendorNames=[...new Set(approvedSvs.map(sv=>sv.vendor_name).filter(Boolean))].join(', ')

    return `<div class="data-row" style="grid-template-columns:2.4fr 0.9fr 1.4fr 1fr 20px" onclick="toggleProd('${a.id}')">
      <div>
        <div class="cell-name-main"><span class="sdot ${dotCls}"></span>${esc(a.name)}</div>
        <div class="cell-name-sub">${doneSms.length} SM selesai · ${approvedSvs.length} SV disetujui</div>
      </div>
      <div class="cell-cat">${esc(a.category)}</div>
      <div class="cell-vendor">${esc(a.profiles?.full_name||'—')}</div>
      <div class="cell-status">${statusBadge}</div>
      <div class="cell-chevron${isOpen?' open':''}">›</div>
    </div>
    <div class="prod-expand${isOpen?' open':''}" id="pexp-${a.id}">
      ${isOpen?buildProdPanel(a,approvedSvs,doneSms,matItems):''}
    </div>`
  }).join('')
}

function buildProdPanel(a,approvedSvs,doneSms,matItems){
  // SM done sizes
  const doneSizes=doneSms.map(sm=>sm.size).filter(Boolean)

  // Per vendor: apa saja sizes yang bisa turun (= SM done)
  const vendorBlocks=approvedSvs.map(sv=>{
    const svSizes=doneSizes // Semua SM done bisa turun di vendor ini
    const sizeHtml=svSizes.length
      ?svSizes.map(s=>`<span class="size-pill size-pill-ok">${esc(s)}</span>`).join('')
      :'<span style="font-size:11px;color:#aaa">Belum ada SM selesai</span>'
    return `<div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:500;color:#111;margin-bottom:4px">${esc(sv.vendor_name||'—')}</div>
      <div style="font-size:9px;color:#aaa;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px">Ukuran yang bisa turun produksi</div>
      <div>${sizeHtml}</div>
    </div>`
  }).join('')

  // SM summary
  const allSizes=doneSizes.map(s=>`<span class="size-pill size-pill-ok">${esc(s)}</span>`).join('')
  const sizeRange=Array.isArray(a.size_range)?a.size_range:(typeof a.size_range==='string'?a.size_range.replace(/[{}"]/g,'').split(',').map(s=>s.trim()).filter(Boolean):[])
  const pendingSizes=sizeRange.filter(s=>!doneSizes.includes(s))
  const pendingHtml=pendingSizes.map(s=>`<span class="size-pill size-pill-pending">${esc(s)}</span>`).join('')

  // Material status summary
  const matHtml=matItems.length
    ?matItems.map(m=>{
      const dot=m.material_status==='ready'?'sdot-green':m.material_status==='missing'?'sdot-red':'sdot-amber'
      return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:0.5px solid #d8d5cf">
        <span class="sdot ${dot}"></span>
        <span style="font-size:11px;color:#111;flex:1">${esc(m.material_name)}</span>
        <span style="font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:0.08em">${esc(m.material_status||'pending')}</span>
      </div>`
    }).join('')
    :'<div style="font-size:11px;color:#aaa;font-style:italic">Belum ada data material.</div>'

  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;padding:16px 32px 20px">
    <div>
      <div class="ep-sec">Sample Master selesai</div>
      <div style="margin-bottom:6px">${allSizes||'<span style="font-size:11px;color:#aaa">Belum ada</span>'}</div>
      ${pendingHtml?`<div style="margin-top:6px"><div style="font-size:9px;color:#bbb;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px">Belum selesai</div>${pendingHtml}</div>`:''}
      <div class="ep-sec" style="margin-top:20px">Vendor yang eligible</div>
      ${vendorBlocks||'<div style="font-size:11px;color:#aaa">—</div>'}
    </div>
    <div>
      <div class="ep-sec">Status Material</div>
      ${matHtml}
    </div>
  </div>`
}

function toggleProd(aid){
  openProdId=openProdId===aid?null:aid
  renderProdReadyPage()
}

// ── SV LIST ──────────────────────────────────────
function renderSvList(){
  const el=document.getElementById('sv-list')
  const grouped={}
  allArticles.forEach(a=>{
    const items=allSvItems.filter(sv=>sv.article_id===a.id&&tabMatch(sv.status))
    const hasDoneSm=allSmItems.some(sm=>sm.article_id===a.id&&sm.status==='done')
    const hasAnySv=allSvItems.some(sv=>sv.article_id===a.id)
    if(!items.length) return
    grouped[a.id]={art:a,items}
  })

  if(!Object.keys(grouped).length){
    el.innerHTML='<div class="empty">Tidak ada item.</div>';return
  }

  let html=''
  Object.values(grouped).forEach(({art,items})=>{
    html+=`<div class="group-hdr">${esc(art.name)}<span style="color:#ddd;margin:0 2px">·</span><span style="letter-spacing:0.08em">${esc(art.category)}</span></div>`

    items.forEach(sv=>{
      const op=openSvId===sv.id
      const sizeLabel=sv.status==='requested'
        ?`${esc(sv.size||'—')} <span style="font-size:9px;color:#185FA5;letter-spacing:0.06em;text-transform:uppercase">· Dari Designer</span>`
        :`${esc(sv.size||'—')} · ${esc(sv.color||'—')}`
      html+=`
      <div class="data-row grid-sv${op?' row-open':''}" onclick="toggleSv('${sv.id}')">
        <div>
          <div class="cell-name-main"><span class="sdot ${dotClass(sv.status)}"></span>${sizeLabel}</div>
          <div class="cell-name-sub">${sv.status==='requested'?'Menunggu diproses Siti':esc(sv.vendor_name||'—')}</div>
        </div>
        <div class="cell-cat">${esc(art.category)}</div>
        <div class="cell-vendor">${sv.status==='requested'?'—':esc(sv.vendor_name||'—')}</div>
        <div class="cell-status">${badgeHtml(sv.status)}</div>
        <div class="cell-chevron${op?' open':''}">›</div>
      </div>
      <div class="expand-wrap${op?' open':''}" id="ep-${sv.id}">${op?buildSvPanel(sv,art):''}</div>`
    })
  })
  el.innerHTML=html
}

// ── SV EXPAND PANEL ──────────────────────────────
function buildSvPanel(sv,a){
  if(sv.status==='requested'){
    const konvOpts=konveksiVendors.map(v=>`<option value="${esc(v.name)}">${esc(v.name)}</option>`).join('')
    return `<div class="expand-body" style="grid-template-columns:1fr 1fr">
      <div>
        <div class="ep-sec">Request dari Designer</div>
        <div class="ep-row"><span class="ep-key">Size</span><span class="ep-val">${esc(sv.size||'—')}</span></div>
        <div class="ep-row"><span class="ep-key">Diminta</span><span class="ep-val">${fmtDate(sv.requested_at)}</span></div>
        <div style="margin-top:16px">
          <div class="ep-sec">Isi Detail Sample Vendor</div>
          <div style="margin-bottom:8px">
            <label class="flabel">Warna *</label>
            <input class="finput" id="svd-color-${sv.id}" placeholder="e.g. Bistre">
          </div>
          <div style="margin-bottom:8px">
            <label class="flabel">Vendor *</label>
            <select class="finput" id="svd-vendor-${sv.id}">
              <option value="">Pilih vendor konveksi...</option>
              ${konvOpts}
            </select>
          </div>
          <div style="margin-bottom:12px">
            <label class="flabel">Catatan</label>
            <input class="finput" id="svd-notes-${sv.id}" placeholder="Opsional...">
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-dark btn-sm" onclick="startProcessingSv('${sv.id}')">Mulai proses →</button>
          </div>
        </div>
      </div>
      <div>
        <div class="ep-sec">Final Spec</div>
        ${buildSpecHtml(a)}
      </div>
    </div>`
  }

  const step=sv.status==='in_progress'||sv.status==='revision'?1:sv.status==='awaiting_head'?2:3
  const steps=['To do','Menunggu Head','Disetujui']
  const prog=`<div class="prog-wrap">${steps.map((s,i)=>{
    const n=i+1,cls=n<step?'p-done':n===step?'p-curr':'p-wait'
    const lc=n<step?'l-done':n===step?'l-curr':'l-wait'
    return `<div class="prog-step">
      <div class="prog-dot ${cls}">${n<step?'✓':n}</div>
      <div class="prog-lbl ${lc}">${s}</div>
    </div>${i<2?'<div class="prog-line"></div>':''}`
  }).join('')}</div>`

  let act=''
  if(sv.status==='in_progress')
    act=`<button class="btn btn-dark" onclick="submitSvToHead('${sv.id}')">Submit ke Head →</button>`
  else if(sv.status==='revision')
    act=`<button class="btn btn-dark" onclick="resubmitSv('${sv.id}')">Re-submit ke Head →</button>`
  else if(sv.status==='awaiting_head')
    act=`<span style="font-size:10px;color:#bbb;letter-spacing:0.1em;text-transform:uppercase">Menunggu Gee...</span>
      <button class="btn btn-ghost btn-sm" onclick="simulateApprove('${sv.id}')">Simulate approve</button>
      <button class="btn btn-ghost btn-sm" onclick="simulateRevision('${sv.id}')">Simulate revision</button>`

  const okBanner=sv.status==='approved'
    ?`<div class="ok-banner">
        <div style="font-size:16px;color:#3B6D11">✓</div>
        <div><div class="ok-text">Head menyetujui</div><div style="font-size:11px;color:#639922;margin-top:2px">${fmtDate(sv.approved_at)}</div></div>
      </div>`:''

  let html=''
  if(sv.status==='revision'){
    html=`<div class="expand-body">
      <div>
        <div class="ep-sec">Revisi dari Head <span style="color:#ccc;font-weight:400">${sv.revision_count||0}×</span></div>
        <div id="rev-hist-${sv.id}"><div style="font-size:11px;color:#aaa;font-style:italic">Memuat...</div></div>
      </div>
      <div>
        <div class="ep-sec">Final Spec</div>
        ${buildSpecHtml(a)}
        <div class="ep-sec" style="margin-top:20px">Sample</div>
        <div class="ep-row"><span class="ep-key">Ukuran</span><span class="ep-val">${esc(sv.size||'—')}</span></div>
        <div class="ep-row"><span class="ep-key">Warna</span><span class="ep-val">${esc(sv.color||'—')}</span></div>
        <div class="ep-row"><span class="ep-key">Vendor</span><span class="ep-val">${esc(sv.vendor_name||'—')}</span></div>
      </div>
    </div>${act?`<div class="expand-actions">${act}</div>`:''}`
    setTimeout(()=>loadRevHistory(sv.id),0)
  } else {
    const showReadiness=sv.status==='in_progress'
    html=`<div class="expand-body">
      <div>
        ${prog}${okBanner}
        <div class="ep-sec">Detail Sample</div>
        <div class="ep-row"><span class="ep-key">Ukuran</span><span class="ep-val">${esc(sv.size||'—')}</span></div>
        <div class="ep-row"><span class="ep-key">Warna</span><span class="ep-val">${esc(sv.color||'—')}</span></div>
        <div class="ep-row"><span class="ep-key">Vendor</span><span class="ep-val">${esc(sv.vendor_name||'—')}</span></div>
        <div class="ep-row"><span class="ep-key">Tanggal turun</span><span class="ep-val">${fmtDate(sv.sent_at)}</span></div>
        <div class="ep-row"><span class="ep-key">Catatan</span><span class="ep-val">${esc(sv.notes||'—')}</span></div>
        ${sv.revision_count>0?`
        <div class="ep-sec" style="margin-top:16px">Riwayat Revisi <span style="color:#ccc;font-weight:400">${sv.revision_count}×</span></div>
        <div id="rev-hist-${sv.id}"><div style="font-size:11px;color:#aaa;font-style:italic">Memuat...</div></div>
        `:''}
        ${showReadiness?`<div class="ep-sec" style="margin-top:16px">Kelengkapan</div>${buildReadinessHtml(a)}`:''}
      </div>

        <div class="ep-sec">Final Spec</div>

      </div>
    </div>${act?`<div class="expand-actions">${act}</div>`:''}`

  }
  return html
}

async function loadRevHistory(svId){
  const el=document.getElementById('rev-hist-'+svId)
  if(!el) return
  const{data,error}=await db.from('sample_vendor_revisions')
    .select('revision_number,note,created_at')
    .eq('sample_vendor_id',svId)
    .order('revision_number',{ascending:true})
  if(error||!data?.length){
    const sv=allSvItems.find(s=>s.id===svId)
    if(sv?.revision_note){
      el.innerHTML=`<div class="rev-hist-item">
        <div class="rev-hist-num">Revisi 1</div>
        <div class="rev-hist-note">${esc(sv.revision_note)}</div>
      </div>`
    } else {
      el.innerHTML='<div style="font-size:11px;color:#aaa;font-style:italic">Belum ada catatan.</div>'
    }
    return
  }
  el.innerHTML=data.map(r=>`<div class="rev-hist-item">
    <div class="rev-hist-num">Revisi ${r.revision_number} <span class="rev-hist-date">${fmtDate(r.created_at)}</span></div>
    <div class="rev-hist-note">${esc(r.note)}</div>
  </div>`).join('')
}

function buildSpecHtml(a){
  const it=(a.article_iterations||[]).find(i=>i.is_final_spec)
  if(!it) return '<div style="font-size:11px;color:#aaa;font-style:italic">Belum ada final spec.</div>'
  const fabs=(it.iteration_fabrics||[]).map(f=>esc(f.fabric_name||'—')+(f.color?' · '+esc(f.color):'')).join('<br>')||'—'
  const ints=(it.iteration_interlining||[]).map(i=>esc(i.interlining_name||'—')+(i.position?' ('+esc(i.position)+')':'')).join('<br>')||'—'
  const accs=(it.iteration_accessories||[]).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)).map(ac=>accLabel(ac)).join('<br>')||'—'
  return `<div class="spec-box">
    <div class="spec-r"><span class="spec-k">Fabric</span><span class="spec-v">${fabs}</span></div>
    <div class="spec-r"><span class="spec-k">Interlining</span><span class="spec-v">${ints}</span></div>
    <div class="spec-r"><span class="spec-k">Accessories</span><span class="spec-v">${accs}</span></div>
  </div>`
}

function buildReadinessHtml(a){
  const sps=a.size_packs||[],confirmed=sps.filter(s=>s.confirmed),spOk=confirmed.length>0
  const cets=a.article_cetakan||[]
  const cv=cets.find(c=>c.type==='vendor'),cq=cets.find(c=>c.type==='qc')
  const cvOk=!!(cv?.file_path||cv?.skip_approved),cqOk=!!(cq?.file_path||cq?.skip_approved)
  const allOk=spOk&&cvOk&&cqOk
  const items=[
    {label:'Size pack',ok:spOk,detail:spOk?confirmed.map(s=>s.size_label).join(', '):'Belum ada'},
    {label:'Cetakan vendor',ok:cvOk,detail:cvOk?(cv?.file_path?`<span class="r-file-link" onclick="openFile('${cv.file_path}')">Lihat</span>`:'Skip'):'Belum ada'},
    {label:'Cetakan QC',ok:cqOk,detail:cqOk?(cq?.file_path?`<span class="r-file-link" onclick="openFile('${cq.file_path}')">Lihat</span>`:'Skip'):'Belum ada'},
  ]
  return `<div style="margin-top:2px">
    ${items.map(it=>`<div class="ep-row">
      <span class="ep-key" style="display:flex;align-items:center;gap:5px">
        <span style="font-size:9px;${it.ok?'color:#3B6D11':'color:#bbb'}">${it.ok?'✓':'○'}</span>
        ${it.label}
      </span>
      <span class="ep-val" style="${it.ok?'color:#111':'color:#aaa'}">${it.detail}</span>
    </div>`).join('')}
    <div style="font-size:10px;margin-top:6px;${allOk?'color:#3B6D11':'color:#854F0B'}">${allOk?'✓ Semua kelengkapan terpenuhi':'⚠ Kelengkapan belum lengkap'}</div>
  </div>`
}

function renderMatList(){
  const el=document.getElementById('mat-list')
  if(!allMatArticles.length){el.innerHTML='<div class="empty">Belum ada artikel.</div>';return}
  el.innerHTML=allMatArticles.map(a=>{
    const items=allMatItems.filter(m=>m.article_id===a.id)
    const allOk=items.length>0&&items.every(m=>m.material_status==='ready')
    const hasMiss=items.some(m=>m.material_status==='missing')
    const isOpen=openMatId===a.id
    const dotCls=allOk?'sdot-green':hasMiss?'sdot-red':'sdot-amber'
    const lbl=allOk?'<span class="badge badge-ready">Semua Siap</span>'
      :hasMiss?'<span class="badge badge-miss">Ada yang Kurang</span>'
      :items.length?'<span class="badge badge-prog">Sedang Proses</span>'
      :'<span class="badge badge-prog">Belum ada</span>'
    const readyCnt=items.filter(m=>m.material_status==='ready').length
    const sub=items.length?`${readyCnt}/${items.length} siap`:esc(a.profiles?.full_name||'—')
    return `<div class="data-row grid-mat${isOpen?' row-open':''}" onclick="toggleMat('${a.id}')">
      <div>
        <div class="cell-name-main"><span class="sdot ${dotCls}"></span>${esc(a.name)}</div>
        <div class="cell-name-sub">${sub}</div>
      </div>
      <div class="cell-cat">${esc(a.category)}</div>
      <div class="cell-vendor">${esc(a.profiles?.full_name||'—')}</div>
      <div class="cell-status">${lbl}</div>
      <div class="cell-chevron${isOpen?' open':''}">›</div>
    </div>
    <div class="expand-wrap${isOpen?' open':''}" id="mep-${a.id}">${isOpen?buildMatPanel(a,items):''}</div>`
  }).join('')
}

function buildMatPanel(a,items){

    <div style="padding:18px 32px 20px">
      <div class="ep-sec" style="margin-bottom:14px">Item Material — ${esc(a.name)}</div>
      <div id="mi-wrap-${a.id}">${itemsHtml}</div>

}

function findVendorForMaterial(m){
  const name=(m.material_name||'').toLowerCase()
  const direct=masterVendors.find(v=>v.name&&name.includes(v.name.toLowerCase()))
  if(direct) return direct
  if(m.material_type==='accessory'&&(name.includes('zipper')||name.includes('ykk')))
    return masterVendors.find(v=>v.name&&v.name.toLowerCase().includes('ykk'))||null
  return null
}

async function toggleMat(aid){
  if(openMatId===aid){openMatId=null;renderMatList();return}
  openMatId=aid
  const a=allMatArticles.find(x=>x.id===aid)||allArticles.find(x=>x.id===aid)
  const{data:existing}=await db.from('article_material_status').select('*').eq('article_id',aid).order('created_at')
  allMatItems=[...allMatItems.filter(m=>m.article_id!==aid),...(existing||[])]
  if(!(existing||[]).length){
    const specItems=buildMatItemsFromSpec(a)
    if(specItems.length>0){
      const{data:inserted,error}=await db.from('article_material_status').insert(
        specItems.map(si=>({article_id:aid,material_name:si.material_name,material_type:si.material_type,material_status:'pending',updated_by:profile.id}))
      ).select()
      if(!error&&inserted){
        allMatItems=[...allMatItems.filter(m=>m.article_id!==aid),...inserted]
        toast('Material di-generate dari final spec.')
      }
    }
  }
  renderMatList();updateBadges()
}

function buildMatItemsFromSpec(a){
  const it=(a.article_iterations||[]).find(i=>i.is_final_spec)
  if(!it) return []
  const items=[]
  ;(it.iteration_fabrics||[]).forEach(f=>items.push({material_type:'fabric',material_name:f.fabric_name+(f.color?' · '+f.color:'')}))
  ;(it.iteration_interlining||[]).forEach(i=>items.push({material_type:'interlining',material_name:i.interlining_name+(i.position?' ('+i.position+')':'')}))
  ;(it.iteration_accessories||[]).forEach(ac=>items.push({material_type:'accessory',material_name:accLabel(ac)}))
  return items
}

        </div>
        <div class="cell-chevron${isOpen?' open':''}" style="font-size:13px;color:#ccc">›</div>
      </div>
      <div class="fab-expand${isOpen?' open':''}">
        <div style="display:flex;gap:48px;margin-bottom:16px">
          <div>
            <div class="ep-sec" style="margin-bottom:10px">Supplier</div>
            ${g.vendor
              ?`<div style="font-size:12px;color:#111;margin-bottom:4px">
                  <span class="fab-vendor-link" onclick="goToVendor('${esc(g.vendor)}')">${esc(g.vendor)} →</span>
                </div>
                <div style="font-size:10px;color:#bbb;margin-top:4px">${esc(vendorEntry?.contact||'Belum ada kontak')}</div>`
              :`<span style="color:#ccc;font-style:italic;font-size:11px">Belum ada supplier</span>`
            }
          </div>
          <div>
            <div class="ep-sec" style="margin-bottom:10px">Warna tersedia</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px">
              ${g.colors.map(c=>`<span style="font-size:11px;color:#111;background:#e4e0d8;padding:3px 10px">${esc(c)}</span>`).join('')}
            </div>
          </div>
        </div>
        <div class="fab-edit-form">
          <div style="font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#aaa;margin-bottom:10px">Update data</div>
          <div class="fgrid2" style="max-width:480px">
            <div>
              <label class="flabel">Supplier</label>
              <input class="finput" id="fab-vendor-${esc(name)}" value="${esc(g.vendor||'')}" placeholder="Nama supplier">
            </div>
            <div>
              <label class="flabel">Qty</label>
              <input class="finput" id="fab-qty-${esc(name)}" value="${esc(g.qty||'')}" placeholder="e.g. 500m">
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-dark btn-sm" onclick="saveFabricData('${esc(name)}')">Simpan</button>
          </div>
        </div>
      </div>`
  }).join('')
}

async function saveFabricData(name){
  const vendor=document.getElementById('fab-vendor-'+name)?.value.trim()
  const qty=document.getElementById('fab-qty-'+name)?.value.trim()
  // Update all rows with this fabric name
  const {error}=await db.from('master_fabrics').update({vendor:vendor||null,qty:qty||null}).eq('name',name)
  if(error){toast('Gagal: '+error.message);return}
  masterFabrics=masterFabrics.map(f=>f.name===name?{...f,vendor:vendor||null,qty:qty||null}:f)
  renderFabrics();toast('Data fabric disimpan.')
}

function toggleFab(name){
  openFabName=openFabName===name?null:name
  renderFabrics()
}

function goToVendor(vendorName){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'))
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.querySelectorAll('.nav-tab').forEach(t=>{if(t.textContent.trim()==='Vendors')t.classList.add('active')})
  document.getElementById('page-master-vendors').classList.add('active')
  const v=masterVendors.find(x=>x.name===vendorName)
  if(v){openVendId=v.id;renderVendors()}
}

function goToVendorById(vid){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'))
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.querySelectorAll('.nav-tab').forEach(t=>{if(t.textContent.trim()==='Vendors')t.classList.add('active')})
  document.getElementById('page-master-vendors').classList.add('active')
  openVendId=vid
  // Open the group that contains this vendor
  const v=masterVendors.find(x=>x.id===vid)
  if(v){
    if(v.supply_category==='konveksi') vendGroupOpen.konveksi=true
    else vendGroupOpen.supplier=true
  }
  renderVendors()
}

// ── INTERLININGS ──────────────────────────────────
function sortInt(col){
  if(intSortCol===col) intSortDir=intSortDir==='asc'?'desc':'asc'
  else {intSortCol=col;intSortDir='asc'}
  renderInterlinings()
}

function renderInterlinings(){
  const el=document.getElementById('int-list')
  if(!masterInterlinings.length){el.innerHTML='<div class="empty">Belum ada data.</div>';return}

  // Update sort arrows in header
  document.querySelectorAll('#int-col-head .sortable').forEach(sp=>{
    const col=sp.getAttribute('onclick').match(/sortInt\('(\w+)'\)/)?.[1]
    const arrow=sp.querySelector('.sort-arrow')
    sp.classList.remove('sort-active')
    if(col===intSortCol){
      sp.classList.add('sort-active')
      if(arrow) arrow.textContent=intSortDir==='asc'?'↑':'↓'
    } else {
      if(arrow) arrow.textContent='↕'
    }
  })

  const sorted=[...masterInterlinings].sort((a,b)=>{
    const va=(a[intSortCol]||'').toString().toLowerCase()
    const vb=(b[intSortCol]||'').toString().toLowerCase()
    if(va<vb) return intSortDir==='asc'?-1:1
    if(va>vb) return intSortDir==='asc'?1:-1
    return 0
  })

  function katBadge(k){
    if(!k) return '<span class="int-tag int-none">—</span>'
    const cls=k==='soft'?'int-soft':k==='medium'?'int-medium':'int-hard'
    const lbl=k==='soft'?'Soft':k==='medium'?'Medium':'Hard'
    return `<span class="int-tag ${cls}">${lbl}</span>`
  }
  function jenisFmt(j){
    if(!j) return '<span style="color:#ccc">—</span>'
    if(j==='non_woven') return '<span style="font-size:11px;color:#555">Non-woven</span>'
    if(j==='cotton_woven') return '<span style="font-size:11px;color:#555">Cotton woven</span>'
    if(j==='poly_woven') return '<span style="font-size:11px;color:#555">Poly woven</span>'
    return `<span style="font-size:11px;color:#555">${esc(j)}</span>`
  }
  function peruntukanFmt(p){
    if(!p) return '<span style="color:#ccc">—</span>'
    if(p==='shirt') return '<span style="font-size:11px;color:#555">Shirt</span>'
    if(p==='outer') return '<span style="font-size:11px;color:#555">Outer</span>'
    if(p==='shirt_outer') return '<span style="font-size:11px;color:#555">Shirt & Outer</span>'
    return `<span style="font-size:11px;color:#555">${esc(p)}</span>`
  }

  el.innerHTML=sorted.map(i=>`
    <div class="int-row grid-int">
      <div class="master-name">${esc(i.name)}</div>
      <div>${katBadge(i.kategori)}</div>
      <div>${jenisFmt(i.jenis)}</div>
      <div>${peruntukanFmt(i.peruntukan)}</div>
      <div style="font-size:11px;color:#555">${esc(i.supplier||'—')}</div>
      <div style="font-size:11px;color:#555">${esc(i.qty||'—')}</div>
    </div>`
  ).join('')
}

// ── VENDORS ───────────────────────────────────────
// Collapsible groups: Vendor konveksi + Supplier
function renderVendors(){
  const konv=masterVendors.filter(v=>v.supply_category==='konveksi')
  const rest=masterVendors.filter(v=>v.supply_category!=='konveksi')
  let html=''

  function vendorRowHtml(v){
    const isOpen=openVendId===v.id
    const contactDisplay=v.contact
      ?`<span class="vend-contact">${esc(v.contact)}</span>`
      :`<span class="vend-contact none">Belum ada</span>`
    return `<div class="vend-row grid-vend-4${isOpen?' row-open':''}">
      <div class="vend-name">${esc(v.name)}</div>
      <div class="vend-cat">${esc(v.supply_category||'—')}</div>
      ${contactDisplay}
      <div style="text-align:right"><button class="vend-edit-btn" onclick="toggleVendEdit('${v.id}')">Edit</button></div>
    </div>
    <div class="vend-edit-form${isOpen?' open':''}" id="vef-${v.id}">
      <div class="fgrid2" style="margin-bottom:10px">
        <div>
          <label class="flabel">Nama vendor</label>
          <input class="finput" id="ve-name-${v.id}" value="${esc(v.name||'')}">
        </div>
        <div>
          <label class="flabel">Kategori</label>
          <input class="finput" id="ve-cat-${v.id}" value="${esc(v.supply_category||'')}">
        </div>
      </div>
      <div style="margin-bottom:12px">
        <label class="flabel">Kontak (No HP / WA)</label>
        <input class="finput" id="ve-contact-${v.id}" value="${esc(v.contact||'')}" placeholder="e.g. 081234567890" style="margin-bottom:0">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="toggleVendEdit('${v.id}')">Batal</button>
        <button class="btn btn-dark btn-sm" onclick="saveVendor('${v.id}')">Simpan</button>
      </div>
    </div>`
  }

  if(konv.length){
    const isOpen=vendGroupOpen.konveksi
    html+=`<div class="vend-group-hdr" onclick="toggleVendGroup('konveksi')">
      <span class="vend-group-title">Vendor Konveksi</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="vend-group-count">${konv.length} vendor</span>
        <span class="vend-group-chevron${isOpen?' open':''}">›</span>
      </div>
    </div>
    <div class="vend-group-body${isOpen?' open':''}">
      <div class="col-head grid-vend-4" style="top:0"><span>Nama</span><span>Kategori</span><span>Kontak</span><span></span></div>
      ${konv.map(v=>vendorRowHtml(v)).join('')}
    </div>`
  }
  if(rest.length){
    const isOpen=vendGroupOpen.supplier
    html+=`<div class="vend-group-hdr" onclick="toggleVendGroup('supplier')">
      <span class="vend-group-title">Supplier Bahan</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="vend-group-count">${rest.length} supplier</span>
        <span class="vend-group-chevron${isOpen?' open':''}">›</span>
      </div>
    </div>
    <div class="vend-group-body${isOpen?' open':''}">
      <div class="col-head grid-vend-4" style="top:0"><span>Nama</span><span>Kategori</span><span>Kontak</span><span></span></div>
      ${rest.map(v=>vendorRowHtml(v)).join('')}
    </div>`
  }
  document.getElementById('vend-list').innerHTML=html||'<div class="empty">Belum ada data.</div>'
}

function toggleVendGroup(grp){
  vendGroupOpen[grp]=!vendGroupOpen[grp]
  renderVendors()
}

function toggleVendEdit(vid){
  openVendId=openVendId===vid?null:vid
  renderVendors()
}

async function saveVendor(vid){
  const name=document.getElementById('ve-name-'+vid)?.value.trim()
  const cat=document.getElementById('ve-cat-'+vid)?.value.trim()
  const contact=document.getElementById('ve-contact-'+vid)?.value.trim()
  if(!name){toast('Nama tidak boleh kosong.');return}
  const{error}=await db.from('master_vendors').update({
    name:name||null,supply_category:cat||null,contact:contact||null
  }).eq('id',vid)
  if(error){toast('Gagal: '+error.message);return}
  const i=masterVendors.findIndex(v=>v.id===vid)
  if(i>-1) masterVendors[i]={...masterVendors[i],name,supply_category:cat,contact}
  openVendId=null
  renderVendors()
  toast('Vendor disimpan.')
}

// ── BADGES ────────────────────────────────────────
function updateBadges(){
  const rev=allSvItems.filter(s=>s.status==='revision').length
  const aw=allSvItems.filter(s=>s.status==='awaiting_head').length
  const req=allSvItems.filter(s=>s.status==='requested').length
  const urgentSv=rev+aw+req
  const nb=document.getElementById('nb-sv')
  nb.textContent=urgentSv;nb.style.display=urgentSv>0?'':'none'
  const ms=allMatItems.filter(m=>m.material_status==='missing').length
  const nm=document.getElementById('nb-mat')
  nm.textContent=ms;nm.style.display=ms>0?'':'none'
}

init()
</script>
